<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>MeshConfig 2.7.x Fix</title>
    <!-- Vi henter en ferdig bundle som inkluderer alt (krypto, buffer, protobuf) -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #1a1a1a; color: white; }
        button { padding: 20px; font-size: 1.2rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 10px; }
        #status { margin-top: 20px; font-family: monospace; color: #00ff00; }
    </style>
</head>
<body>

    <h1>Secure Admin (Browser Fix)</h1>
    <button id="btn">KOBLE TIL & REBOOT</button>
    <div id="status">Klar.</div>

    <script>
        // Når vi bruker dist/meshtastic.js, ligger alt under Meshtastic-objektet
        const { SerialConnection, MeshDevice } = Meshtastic;

        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            status.innerText = "Kobler til...";
            btn.disabled = true;

            try {
                const connection = new SerialConnection();
                const device = new MeshDevice(connection);

                await connection.connect();
                status.innerText = "Forhandler sikker sesjon (PKI)...";

                // Dette er det kritiske punktet. Vi venter på at biblioteket
                // bekrefter at sesjonsnøklene er utvekslet.
                device.onDeviceStatus.subscribe(async (s) => {
                    console.log("Status:", s);
                    if (s === 2) { // Ready
                        status.innerText = "Sikker sesjon OK! Sender reboot...";
                        await device.reboot(1);
                        status.innerText = "REBOOT SENDT!";
                        btn.disabled = false;
                    }
                });

            } catch (err) {
                status.innerText = "Feil: " + err.message;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
