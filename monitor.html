<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>MeshConfig 2.7.x - Secure Admin</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 50px; background: #1a1a1a; color: white;">

    <h2>Secure Reboot Test</h2>
    <button id="btn" style="padding: 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 10px;">
        KOBLE TIL & REBOOT
    </button>
    <div id="status" style="margin-top: 20px; color: #00ff00;">Klar.</div>
    <pre id="log" style="text-align: left; background: #000; padding: 10px; margin-top: 20px; font-size: 11px; color: #888; overflow-y: auto; max-height: 200px;"></pre>

    <script type="module">
        // Vi bruker en stabil "bundle" som fungerer uten lokal fil
        import * as MeshtasticJS from 'https://jsdelivr.net';

        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const log = document.getElementById('log');

        function writeLog(msg) {
            log.innerText += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
            console.log(msg);
        }

        btn.onclick = async () => {
            status.innerText = "Kobler til...";
            btn.disabled = true;
            writeLog("Starter SerialConnection...");

            try {
                const connection = new MeshtasticJS.SerialConnection();
                const device = new MeshtasticJS.MeshDevice(connection);

                await connection.connect();
                writeLog("Port åpen. Forhandler PKI...");

                device.onDeviceStatus.subscribe(async (s) => {
                    writeLog("Status-endring: " + s);
                    
                    if (s === 1) status.innerText = "Forhandler sikker sesjon...";
                    
                    if (s === 2) { // Ready
                        status.innerText = "Sikker sesjon OK! Sender reboot...";
                        writeLog("Sender kryptert reboot-pakke...");
                        await device.reboot(1);
                        status.innerText = "REBOOT SENDT!";
                        writeLog("Suksess!");
                        btn.disabled = false;
                    }
                });

            } catch (err) {
                writeLog("FEIL: " + err.message);
                status.innerText = "Feil: " + err.message;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
