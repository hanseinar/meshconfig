<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Meshtastic Quick Fix</title>
</head>
<body style="font-family:sans-serif; padding:20px;">
    <h2>Meshtastic Navnebytte (Direkte)</h2>
    <p>Denne sender navnet "Navn" direkte uten biblioteker.</p>
    
    <button id="go" style="padding:15px; background:green; color:white; cursor:pointer;">
        KOBLE TIL OG SETT NAVN
    </button>
    
    <p id="stat">Status: Venter...</p>

    <script>
        document.getElementById('go').onclick = async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                const writer = port.writable.getWriter();
                document.getElementById('st').innerText = "Sender data...";

                // Dette er den binære Protobuf-pakken for å sette LongName til "Navn"
                // Dette er "rå-språket" Meshtastic forstår direkte
                const data = new Uint8Array([
                    0x12, 0x11, 0x0a, 0x04, 0x4e, 0x61, 0x76, 0x6e, // "Navn"
                    0x12, 0x04, 0x4e, 0x61, 0x76, 0x6e,             // "Navn" (Short)
                    0x18, 0x00
                ]);

                await writer.write(data);
                writer.releaseLock();
                document.getElementById('stat').innerText = "Sendt! Sjekk enheten din.";
                alert("Kommando sendt over COM-port.");
            } catch (e) {
                document.getElementById('stat').innerText = "Feil: " + e.message;
            }
        };
    </script>
</body>
</html>
