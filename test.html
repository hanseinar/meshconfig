<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Meshtastic Fix</title></head>
<body style="font-family:sans-serif; padding:20px;">
    <h3>Endre Longname (COM4)</h3>
    <input type="text" id="n" placeholder="Skriv navn her..." style="padding:10px;">
    <button id="go" style="padding:10px; background:green; color:white;">SEND NAVN</button>
    <p id="s">Status: Klar</p>

    <script>
        document.getElementById('go').onclick = async () => {
            const status = document.getElementById('s');
            const name = document.getElementById('n').value || "Navn";
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                const writer = port.writable.getWriter();
                
                // 1. Bygg selve navne-pakken (User protobuf)
                const enc = new TextEncoder();
                const b = enc.encode(name);
                const userMsg = new Uint8Array([0x0a, b.length, ...b, 0x12, 4, ...b.slice(0,4)]);

                // 2. Bygg ToRadio-pakken (Setter innpakning for konfigurasjon)
                const toRadio = new Uint8Array([0x22, userMsg.length, ...userMsg]);

                // 3. Legg på Serial Framing (Dette manglet i forrige forsøk!)
                // [0x94, 0xc0] er start-bytes for Meshtastic serieprotokoll
                const frame = new Uint8Array([0x94, 0xc0, 0x00, toRadio.length, ...toRadio]);

                await writer.write(frame);
                writer.releaseLock();
                status.innerText = "Sendt! Enheten skal nå oppdatere seg.";
            } catch (e) {
                status.innerText = "Feil: " + e.message;
            }
        };
    </script>
</body>
</html>
