<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Meshtastic Navnebytte</title>
</head>
<body style="font-family:sans-serif; padding:20px; max-width:400px;">
    <h2>Endre Longname</h2>
    <p>Skriv inn nytt navn og trykk koble til.</p>
    
    <input type="text" id="navnFelt" placeholder="Nytt navn" style="width:100%; padding:10px; margin-bottom:10px;">
    <button id="go" style="width:100%; padding:15px; background:blue; color:white; border:none; cursor:pointer;">
        1. VELG COM4 OG SEND
    </button>
    
    <p id="status">Status: Venter på klikk...</p>

    <script>
        document.getElementById('go').onclick = async () => {
            const statusFelt = document.getElementById('status');
            const nyttNavn = document.getElementById('navnFelt').value || "Navn";
            
            try {
                // 1. Be om tilgang til port
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                const writer = port.writable.getWriter();
                
                statusFelt.innerText = "Sender '" + nyttNavn + "'...";

                // 2. Lag binærpakke (Enkel Protobuf-encoding for User-melding)
                const encoder = new TextEncoder();
                const nameBytes = encoder.encode(nyttNavn);
                const shortBytes = encoder.encode(nyttNavn.substring(0,4));
                
                // Vi bygger pakken manuelt: [Tag][Lengde][Data...]
                const packet = new Uint8Array([
                    0x0a, nameBytes.length, ...nameBytes,   // Field 1: Longname
                    0x12, shortBytes.length, ...shortBytes, // Field 2: Shortname
                    0x18, 0x00                              // Field 3: Mac (0)
                ]);

                // 3. Send over serieporten
                await writer.write(packet);
                writer.releaseLock();
                
                statusFelt.innerText = "Sendt! Sjekk enheten.";
                alert("Navnet er sendt til Meshtastic-enheten.");
            } catch (e) {
                statusFelt.innerText = "Feil: " + e.message;
            }
        };
    </script>
</body>
</html>
