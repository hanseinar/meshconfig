<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Meshtastic Navnebytte</title>
    <!-- Vi henter nå biblioteket lokalt fra samme mappe -->
    <script src="meshtastic.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 10px; box-shadow: 2px 2px 10px #eee; }
        input { display: block; width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Endre Navn</h3>
        <button id="btnConnect">1. Koble til (COM4)</button>
        <hr>
        <input type="text" id="longName" placeholder="Fullt navn" disabled>
        <input type="text" id="shortName" placeholder="Kortnavn (4 tegn)" maxlength="4" disabled>
        <button id="btnSend" disabled>2. Lagre til enhet</button>
        <div id="status">Status: Ventet på bruker...</div>
    </div>

    <script>
        let connection;
        
        // Sjekk om biblioteket ble lastet korrekt
        if (typeof meshtastic === 'undefined') {
            document.getElementById('status').innerText = "FEIL: Fant ikke meshtastic.js i mappen!";
        }

        const btnConnect = document.getElementById('btnConnect');
        const btnSend = document.getElementById('btnSend');
        const status = document.getElementById('status');

        btnConnect.onclick = async () => {
            try {
                connection = new meshtastic.SerialConnection();
                await connection.connect();
                status.innerText = "Status: Tilkoblet!";
                btnConnect.disabled = true;
                document.getElementById('longName').disabled = false;
                document.getElementById('shortName').disabled = false;
                btnSend.disabled = false;
            } catch (e) {
                status.innerText = "Feil: " + e.message;
            }
        };

        btnSend.onclick = async () => {
            const ln = document.getElementById('longName').value;
            const sn = document.getElementById('shortName').value;
            try {
                status.innerText = "Sender...";
                await connection.setOwner(ln, sn);
                status.innerText = "Suksess! Navn oppdatert.";
                alert("Navn er endret!");
            } catch (e) {
                status.innerText = "Feil ved sending: " + e.message;
            }
        };
    </script>
</body>
</html>
