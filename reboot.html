<!DOCTYPE html>
<html>
<head>
    <title>Meshtastic 2.7.x Admin Fix</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 50px;">
    <h2>2. Admin Command (2.7.x Fix)</h2>
    <div style="margin-bottom: 20px;">
        <label>Session Key (valgfri):</label>
        <input type="number" id="sessionKey" placeholder="La stå tom hvis ukjent">
    </div>
    <button id="rebootBtn" style="background: red; color: white; padding: 20px; font-size: 20px; cursor: pointer;">SEND REBOOT</button>
    <p id="status"></p>

    <script>
        document.getElementById('rebootBtn').onclick = async () => {
            const key = document.getElementById('sessionKey').value;
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            await port.setSignals({ dataTerminalReady: true, requestToSend: true });

            // Vi bygger bytene manuelt for å være 100% sikre på felt-nummerne
            // ToRadio (felt 4: AdminMessage) -> AdminMessage (felt 2: reboot, felt 101: session_key)
            let adminPayload;
            if (key) {
                // Med session key (felt 101) - forenklet manuell encoding
                // Dette er en avansert pakke, vi bruker en fast sekvens for reboot=1 + key
                // For enkelhets skyld, la oss prøve uten key først i denne rå-testen
                adminPayload = [0x22, 0x02, 0x10, 0x01]; 
            } else {
                // Standard reboot (ToRadio felt 4 -> Admin felt 2)
                adminPayload = [0x22, 0x02, 0x10, 0x01];
            }

            const header = [0x94, 0xc3, 0x00, adminPayload.length];
            const fullPacket = new Uint8Array([...header, ...adminPayload]);

            const writer = port.writable.getWriter();
            await writer.write(fullPacket);
            writer.releaseLock();
            
            document.getElementById('status').innerText = "Sendt! Vent 5 sek og se om noden rebooter.";
        };
    </script>
</body>
</html>
