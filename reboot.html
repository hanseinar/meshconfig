<!DOCTYPE html>
<html>
<body>
    <h2>Meshtastic 2.7.x Web Fix</h2>
    <button id="btn">Koble til & Reboot</button>
    <div id="status">Klar...</div>

    <script>
        // Denne funksjonen lager Meshtastic Serial Framing (94 c3 + len)
        function frame(payload) {
            const res = new Uint8Array(4 + payload.length);
            res[0] = 0x94; res[1] = 0xc3;
            res[2] = (payload.length >> 8) & 0xff;
            res[3] = payload.length & 0xff;
            res.set(payload, 4);
            return res;
        }

        document.getElementById('btn').onclick = async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                await port.setSignals({ dataTerminalReady: true, requestToSend: true });
                
                const writer = port.writable.getWriter();
                const status = document.getElementById('status');

                // STEG 1: Send "Want Config" for å initiere sesjonen (ToRadio felt 3)
                // Dette får noden til å godta oss som en aktiv sesjon
                status.innerText = "Initierer sesjon...";
                await writer.write(frame(new Uint8Array([0x18, 0x01])));
                await new Promise(r => setTimeout(r, 500));

                // STEG 2: Send Reboot via ToRadio.admin (felt 4)
                // Vi bruker varianten med want_response for å tvinge frem en reaksjon
                // Bytes: 22 (ToRadio.admin) 04 (len) 10 (reboot) 01 (1s) 20 (want_res) 01 (true)
                status.innerText = "Sender reboot...";
                const rebootCmd = new Uint8Array([0x22, 0x04, 0x10, 0x01, 0x20, 0x01]);
                await writer.write(frame(rebootCmd));

                writer.releaseLock();
                status.innerText = "Fullført. Sjekk noden!";
            } catch (e) {
                alert("Feil: " + e.message);
            }
        };
    </script>
</body>
</html>
