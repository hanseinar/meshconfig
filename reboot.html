<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>MeshConfig 2.7.x - Som Flasheren</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #1a1a1a; color: white; }
        button { padding: 20px; font-size: 1.2rem; cursor: pointer; background: #238636; color: white; border: none; border-radius: 10px; }
        #log { margin-top: 20px; font-family: monospace; color: #888; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto; background: #000; padding: 10px; }
    </style>
</head>
<body>

    <h1>Secure Reboot (2.7.x)</h1>
    <button id="btn">KOBLE TIL & REBOOT</button>
    <div id="log">Status: Klar. Vent på tilkobling...</div>

    <!-- Vi bruker Meshtastic sitt offisielle bibliotek fra en kilde som garantert fungerer i browser -->
    <script type="module">
        // Vi bruker ESM.run som ofte er mer stabil for ferdige pakker
        import { SerialConnection, MeshDevice } from 'https://jsdelivr.net';

        const btn = document.getElementById('btn');
        const log = document.getElementById('log');

        function writeLog(msg) {
            log.innerText += "\n> " + msg;
            console.log(msg);
        }

        btn.onclick = async () => {
            writeLog("Ber om port...");
            try {
                const connection = new SerialConnection();
                const device = new MeshDevice(connection);

                // Koble til serieporten
                await connection.connect();
                writeLog("Port åpen. Venter på PKI-håndtrykk...");

                // Lytter på status
                device.onDeviceStatus.subscribe(async (status) => {
                    // status 2 betyr 'DeviceStatus.DeviceReady'
                    if (status === 2) {
                        writeLog("Sikker sesjon OK! Sender reboot...");
                        try {
                            await device.reboot(1);
                            writeLog("REBOOT SENDT! Noden starter på nytt.");
                        } catch (e) {
                            writeLog("Feil ved reboot: " + e.message);
                        }
                    } else {
                        writeLog("Status-oppdatering: " + status);
                    }
                });

            } catch (err) {
                writeLog("FEIL: " + err.message);
                if (err.message.includes("buffer")) {
                    writeLog("Tips: Browseren din mangler Polyfills for krypto.");
                }
            }
        };
    </script>
</body>
</html>
