<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>MeshConfig 2.7.x Fix</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #1a1a1a; color: white; }
        #status { margin-top: 20px; color: #aaa; font-family: monospace; }
        button { padding: 20px; font-size: 1.2rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 10px; }
        button:disabled { background: #444; }
    </style>
</head>
<body>

    <h1>Secure Reboot (2.7.x)</h1>
    <button id="btn">KOBLE TIL & REBOOT</button>
    <div id="status">Klar...</div>

    <script type="module">
        // Vi henter de tre nødvendige delene fra biblioteket
        import { SerialConnection, MeshDevice, DeviceStatus } from 'https://skypack.dev';

        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            status.innerText = "Ber om port...";
            btn.disabled = true;

            try {
                // 1. Opprett tilkobling
                const connection = new SerialConnection();
                const device = new MeshDevice(connection);

                // 2. Start WebSerial
                await connection.connect();
                status.innerText = "Koblet til. Forhandler sikker sesjon...";

                // 3. Vent på at PKI-håndtrykket blir ferdig (DeviceReady)
                const subscription = device.onDeviceStatus.subscribe((s) => {
                    console.log("Status endret:", s);
                    
                    if (s === 2) { // 2 er "DeviceStatus.DeviceReady"
                        status.innerText = "Sikker sesjon OK! Sender reboot...";
                        
                        device.reboot(1).then(() => {
                            status.innerText = "REBOOT SENDT! Noden starter på nytt.";
                            btn.disabled = false;
                            subscription.unsubscribe();
                        }).catch(err => {
                            status.innerText = "Feil ved sending: " + err.message;
                        });
                    }
                });

                // Fail-safe hvis ingenting skjer på 10 sekunder
                setTimeout(() => {
                    if (btn.disabled && status.innerText.includes("Forhandler")) {
                        status.innerText = "Timeout: Noden svarte ikke på PKI-forespørsel.";
                        btn.disabled = false;
                    }
                }, 10000);

            } catch (err) {
                status.innerText = "Feil: " + err.message;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
