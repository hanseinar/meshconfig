<!DOCTYPE html>
<html>
<head>
    <title>Meshtastic PKI Discovery (Raw)</title>
</head>
<body style="font-family: monospace; background: #0d1117; color: #58a6ff; padding: 20px;">
    <h2>Discovery: Sjekker PKI-status (Uten biblioteker)</h2>
    <button id="check" style="padding: 15px; cursor: pointer; background: #238636; color: white; border: none; border-radius: 6px;">Koble til og sjekk</button>
    
    <div id="status" style="margin-top: 20px; color: #ffa657;"></div>
    <pre id="output" style="background: #161b22; padding: 15px; border: 1px solid #30363d; margin-top: 10px; white-space: pre-wrap; color: #d1d5da;"></pre>

    <script>
        document.getElementById('check').onclick = async () => {
            const status = document.getElementById('status');
            const output = document.getElementById('output');
            output.innerText = "";
            
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                await port.setSignals({ dataTerminalReady: true, requestToSend: true });

                status.innerText = "Sender Metadata-forespørsel...";

                // Rå ToRadio pakke: want_config_id = 1
                // Bytes: 18 (felt 3) 01 (verdi 1)
                const payload = new Uint8Array([0x18, 0x01]);
                const framed = new Uint8Array([0x94, 0xc3, 0x00, payload.length, ...payload]);

                const writer = port.writable.getWriter();
                await writer.write(framed);
                writer.releaseLock();

                status.innerText = "Lytter etter svar (deviceMetadata)...";
                const reader = port.readable.getReader();

                // Vi ser etter mønsteret for deviceMetadata i FromRadio
                // I Protobuf er deviceMetadata felt nr 11. 
                // Vi skanner etter "5a" (felt 11, wire type 2) eller kjente strenger.
                
                const timeout = setTimeout(() => { reader.cancel(); status.innerText = "Ferdig (Timeout)"; }, 5000);

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const hex = Array.from(value).map(b => b.toString(16).padStart(2, '0')).join(' ');
                    output.innerText += hex + " ";

                    // Hurtigsjekk: "pki_auth_enabled" er ofte streng-basert i metadata
                    // Vi leter etter tegn på om PKI er på (ofte etterfulgt av en lang public key)
                    if (hex.includes("5a")) { // Indikasjon på metadata-felt
                         status.innerText = "Data mottatt. Analyser loggen over for lange strenger (Public Key).";
                    }
                }
            } catch (err) {
                status.innerText = "Feil: " + err.message;
            }
        };
    </script>
</body>
</html>
